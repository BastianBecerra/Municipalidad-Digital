services:
  api-gateway:
    build: .
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - muni-network

networks:
  muni-network:
    external: true
