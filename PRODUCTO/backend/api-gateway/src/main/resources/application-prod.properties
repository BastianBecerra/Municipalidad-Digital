server.port=${PORT:${SERVER_PORT:8080}}

# Railway MVP: use direct service URLs instead of Eureka.
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
spring.cloud.discovery.enabled=${SPRING_CLOUD_DISCOVERY_ENABLED:false}

spring.cloud.gateway.routes[0].uri=${GATEWAY_USUARIOS_URI}
spring.cloud.gateway.routes[1].uri=${GATEWAY_BLOCKCHAIN_URI}
spring.cloud.gateway.routes[2].uri=${GATEWAY_DOCUMENTOS_URI}
spring.cloud.gateway.routes[3].uri=${GATEWAY_VALIDACION_URI}
