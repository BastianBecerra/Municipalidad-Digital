server.port=${PORT:${SERVER_PORT:8080}}

# Railway MVP: use direct service URLs instead of Eureka.
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
spring.cloud.discovery.enabled=${SPRING_CLOUD_DISCOVERY_ENABLED:false}

spring.cloud.gateway.routes[0].uri=${GATEWAY_USUARIOS_URI:http://usuarios.railway.internal:8080}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/usuarios/**,/auth/**,/usuarios/**,/territorios/**
spring.cloud.gateway.routes[1].uri=${GATEWAY_BLOCKCHAIN_URI:http://blockchain.railway.internal:8080}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/blockchain/**
spring.cloud.gateway.routes[2].uri=${GATEWAY_DOCUMENTOS_URI:http://documentos.railway.internal:8080}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/documentos/**,/documentos/**
spring.cloud.gateway.routes[3].uri=${GATEWAY_VALIDACION_URI:http://Validacion.railway.internal:8080}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/validacion/**
