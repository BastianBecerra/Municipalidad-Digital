services:
  postgres-usuarios:
    image: postgres:16-alpine
    container_name: postgres-usuarios
    restart: unless-stopped
    environment:
      POSTGRES_DB: usuarios_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_usuarios_data:/var/lib/postgresql/data

  app-usuarios:
    build: .
    container_name: app-usuarios
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-usuarios:5432/usuarios_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
    depends_on:
      - postgres-usuarios
    networks:
      - default
      - muni-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-usuarios
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@muni.cl
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres-usuarios

volumes:
  postgres_usuarios_data:

networks:
  muni-network:
    external: true
