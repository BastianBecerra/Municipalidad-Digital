# --- H2 In-Memory Database ---
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- Hibernate DDL Auto ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# --- Disable Flyway in Tests ---
spring.flyway.enabled=false

# --- Shared JWT Secret for Security ---
jwt.secret=bXVuaS1kaWdpdGFsLXNlY3JldC1rZXktMjAyNC1zZWN1cmUtand0LXRva2Vu

# --- Microservices integration ---
muni.usuarios.url=http://localhost:8086/usuarios
muni.territorios.url=http://localhost:8086/territorios
muni.blockchain.url=http://localhost:8087/api/blockchain
muni.notificacion.url=http://localhost:8090/api/notificaciones/public

# --- Resilience4j Circuit Breaker Config for Tests ---
resilience4j.circuitbreaker.instances.blockchainCB.sliding-window-size=5
resilience4j.circuitbreaker.instances.blockchainCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.blockchainCB.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.blockchainCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.blockchainCB.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.notificacionCB.sliding-window-size=5
resilience4j.circuitbreaker.instances.notificacionCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.notificacionCB.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.notificacionCB.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.notificacionCB.automatic-transition-from-open-to-half-open-enabled=true
