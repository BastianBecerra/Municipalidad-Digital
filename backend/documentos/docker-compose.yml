services:
  postgres-documentos:
    image: postgres:16-alpine
    container_name: postgres-documentos
    restart: unless-stopped
    environment:
      POSTGRES_DB: documentos_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - postgres_documentos_data:/var/lib/postgresql/data
    networks:
      - muni-network

  app-documentos:
    build: .
    container_name: app-documentos
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-documentos:5432/documentos_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      MUNI_BLOCKCHAIN_URL: http://host.docker.internal:8087/api/blockchain
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres-documentos
    networks:
      - muni-network

  pgadmin-documentos:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-documentos
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@muni.cl
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5051:80"
    depends_on:
      - postgres-documentos
    networks:
      - muni-network

networks:
  muni-network:
    external: true

volumes:
  postgres_documentos_data:
